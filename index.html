<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Dreamer | Mission 1</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h3 class="mission">MISSION 1</h3>

        <h1>DIGITAL DREAMER</h1>

        <p class="subtitle">
            Recover the First Digital Key
        </p>

        <hr>

        <div id="missionBox">

            <h2>Welcome Agent.</h2>

            <p>
                You have successfully discovered a valid QR code.
            </p>

            <p>
                Complete every challenge correctly to unlock the next destination.
            </p>

            <button id="startBtn">
                START MISSION
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>
<div id="popup" class="popup hidden">
    <div class="popup-box">

        <h2 id="popupTitle"></h2>

        <p id="popupMessage"></p>

        <button id="popupBtn">
            OK
        </button>

    </div>
</div>
</body>
</html>
